# Jupyter Book configuration

title: HMMPY
author: Mike Hamilton
copyright: "2026"

exclude_patterns:
  - ".DS_Store"
  - "Thumbs.db"
  - ".git/**"
  - ".github/**"
  - ".hypothesis/**"
  - ".mypy_cache/**"
  - ".opencode/**"
  - ".pytest_cache/**"
  - ".ruff_cache/**"
  - ".venv/**"
  - ".worktrees/**"
  - "_build/**"
  - "dist/**"
  - "docs/**"
  - "AGENTS.md"

only_build_toc_files: true

html:
  title: HMMPY Documentation

execute:
  execute_notebooks: cache

parse:
  myst_enable_extensions:
    - colon_fence
    - dollarmath
    - amsmath
    - linkify
    - substitution
    - tasklist

sphinx:
  local_extensions:
    hmmpy_docs_ext: .
  config:
    nb_kernel_rgx_aliases:
      "^python3$": "hmmpy-docs"
